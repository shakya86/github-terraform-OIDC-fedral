on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  my_job:
    name: deploy to staging
    runs-on: ubuntu-22.04      
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
          
      - name: Azure CLI script
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show
            
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform plan
        run: terraform plan
        
      - name: Terraform Apply
        run: terraform apply -auto-approve

        
      
