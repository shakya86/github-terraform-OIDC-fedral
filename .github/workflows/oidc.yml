on:
  pull_request:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  my_job:
    name: deploy to staging
    runs-on: ubuntu-22.04      
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
          
      - name: Azure CLI script1
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show    
